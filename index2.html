<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="공문·민원답변 등 텍스트의 탭, 중복공백, 빈 줄, 중복 줄을 일괄 정제하는 단일 페이지 웹 도구">
<title>텍스트 정제 도구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d2e;
    --bg-card: #1e2235;
    --bg-textarea: #13151f;
    --accent-blue: #4f8ef7;
    --accent-purple: #8b5cf6;
    --accent-cyan: #22d3ee;
    --accent-green: #10b981;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #2d3355;
    --border-focus: #4f8ef7;
    --gradient-hero: linear-gradient(135deg, #4f8ef7 0%, #8b5cf6 50%, #22d3ee 100%);
    --gradient-btn: linear-gradient(135deg, #4f8ef7 0%, #8b5cf6 100%);
    --shadow-glow: 0 0 30px rgba(79, 142, 247, 0.15);
    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79, 142, 247, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
  }

  header {
    padding: 2.5rem 1rem 1.5rem;
    text-align: center;
    position: relative;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(79, 142, 247, 0.1);
    border: 1px solid rgba(79, 142, 247, 0.25);
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent-blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
    background: var(--gradient-hero);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--text-secondary);
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem 3rem;
  }

  /* Rules strip */
  .rules-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.8rem;
    justify-content: center;
  }

  .rule-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(30, 34, 53, 0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.7rem;
    font-size: 0.72rem;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
  }

  .rule-chip .num {
    color: var(--accent-cyan);
    font-weight: 600;
    font-size: 0.65rem;
  }

  /* Main card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    box-shadow: var(--shadow-card);
    margin-bottom: 1.2rem;
  }

  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    align-items: start;
  }

  @media (max-width: 640px) {
    .editor-grid { grid-template-columns: 1fr; }
  }

  .pane-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-blue { background: var(--accent-blue); }
  .dot-green { background: var(--accent-green); }

  textarea {
    width: 100%;
    height: 260px;
    background: var(--bg-textarea);
    color: var(--text-primary);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.12);
  }

  textarea[readonly] {
    border-color: rgba(16, 185, 129, 0.25);
    background: rgba(16, 185, 129, 0.03);
  }

  textarea[readonly]:focus {
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
  }

  /* Actions row */
  .actions {
    display: flex;
    gap: 0.8rem;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 1.2rem;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--gradient-btn);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.7rem 1.8rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(79, 142, 247, 0.3);
    letter-spacing: -0.01em;
  }

  .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(79, 142, 247, 0.4);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1.2rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    border-color: var(--accent-green);
    color: var(--accent-green);
    background: rgba(16, 185, 129, 0.06);
  }

  .btn-clear {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 0.65rem 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .btn-clear:hover {
    color: #f87171;
    background: rgba(248, 113, 113, 0.06);
    border-color: rgba(248, 113, 113, 0.2);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-top: 1.2rem;
    padding: 0.9rem 1rem;
    background: rgba(13, 15, 23, 0.6);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .stat-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 500;
  }

  .stat-value {
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
  }

  .stat-value.highlight { color: var(--accent-cyan); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(16, 185, 129, 0.9);
    color: #fff;
    padding: 0.6rem 1.4rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 999;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Divider arrow */
  .arrow-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 2.2rem;
  }

  @media (max-width: 640px) {
    .arrow-divider { padding-top: 0; transform: rotate(90deg); }
  }

  .arrow-icon {
    width: 32px;
    height: 32px;
    background: rgba(79, 142, 247, 0.1);
    border: 1px solid rgba(79, 142, 247, 0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-blue);
    font-size: 1rem;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(79, 142, 247, 0.3); }
    50% { box-shadow: 0 0 0 6px rgba(79, 142, 247, 0); }
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }

  .footer-rules {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .footer-rule {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    background: rgba(30, 34, 53, 0.8);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15rem 0.45rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <div class="header-badge">✦ Text Cleaner</div>
  <h1>텍스트 정제 도구</h1>
  <p class="subtitle">공문·민원답변 텍스트의 탭, 공백, 중복 줄을<br>7단계 규칙으로 일괄 정제합니다</p>
</header>

<main>

  <!-- Rules chips -->
  <div class="rules-strip" aria-label="정제 규칙 목록">
    <span class="rule-chip"><span class="num">01</span> \t → 공백</span>
    <span class="rule-chip"><span class="num">02</span> 。→ .</span>
    <span class="rule-chip"><span class="num">03</span> 다중공백 압축</span>
    <span class="rule-chip"><span class="num">04</span> 줄 trim</span>
    <span class="rule-chip"><span class="num">05</span> 빈 줄 압축</span>
    <span class="rule-chip"><span class="num">06</span> 중복 줄 제거</span>
    <span class="rule-chip"><span class="num">07</span> 선·후행 빈 줄 제거</span>
  </div>

  <div class="card">
    <!-- Editors -->
    <div class="editor-grid">

      <!-- Input -->
      <div>
        <div class="pane-label">
          <span class="dot dot-blue"></span>
          입력 텍스트
        </div>
        <textarea
          id="in"
          placeholder="정제할 텍스트를 여기에 붙여넣으세요.&#10;&#10;예) 탭&#9;문자, 중국식 마침표。, 다중   공백 등을 포함한 텍스트."
          spellcheck="false"
          aria-label="입력 텍스트"
        ></textarea>
      </div>

      <!-- Arrow -->
      <div class="arrow-divider" aria-hidden="true">
        <div class="arrow-icon">→</div>
      </div>

      <!-- Output -->
      <div>
        <div class="pane-label">
          <span class="dot dot-green"></span>
          정제 결과
        </div>
        <textarea
          id="out"
          readonly
          placeholder="[정제하기] 버튼을 누르면 결과가 표시됩니다."
          spellcheck="false"
          aria-label="정제 결과"
        ></textarea>
      </div>

    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button id="btn-run" class="btn-primary" onclick="run()">
        ⚡ 정제하기
      </button>
      <button id="btn-copy" class="btn-secondary" onclick="copyResult()" disabled>
        📋 결과 복사
      </button>
      <button class="btn-clear" onclick="clearAll()">
        ✕ 초기화
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar" aria-live="polite">
      <div class="stat-item">
        <span class="stat-label">입력 글자수</span>
        <span class="stat-value" id="stat-in">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">출력 글자수</span>
        <span class="stat-value highlight" id="stat-out">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">입력 줄수</span>
        <span class="stat-value" id="stat-lines-in">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">출력 줄수</span>
        <span class="stat-value highlight" id="stat-lines-out">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">감소율</span>
        <span class="stat-value" id="stat-reduction">—</span>
      </div>
    </div>
  </div>

</main>

<footer>
  <div>텍스트 정제 도구 · 정제 규칙 7단계 적용</div>
  <div class="footer-rules">
    <span class="footer-rule">tab→sp</span>
    <span class="footer-rule">。→.</span>
    <span class="footer-rule">multi-sp</span>
    <span class="footer-rule">trim</span>
    <span class="footer-rule">blank-lines</span>
    <span class="footer-rule">dedup-lines</span>
    <span class="footer-rule">strip-edges</span>
  </div>
</footer>

<!-- Toast notification -->
<div id="toast" role="status" aria-live="polite"></div>

<script>
/**
 * 텍스트 정제 함수 — requirements.md 7단계 규칙 순서대로 적용
 * @param {string} text
 * @returns {string}
 */
function purify(text) {
  // 1. 탭 → 공백 한 칸
  text = text.replace(/\t/g, ' ');

  // 2. 중국식 마침표 표준화: 。→ .
  text = text.replace(/。/g, '.');

  // 3. 줄별 다중 공백 정규화: 같은 줄 내 연속 공백 2개↑ → 1개
  //    (각 줄을 분리하지 않고 [^\S\n\r]으로 줄 내 공백만 대상)
  text = text.replace(/[^\S\n\r]{2,}/g, ' ');

  // 4. 줄 양끝 trim: 각 줄의 앞뒤 공백 제거
  //    CRLF, LF, CR 모두 대응
  text = text.split(/\r?\n|\r/).map(line => line.trim()).join('\n');

  // 5. 빈 줄 압축: 연속 빈 줄(2개↑) → 1개
  text = text.replace(/\n{3,}/g, '\n\n');

  // 6. 인접 중복 줄 제거: 동일 줄이 바로 다음 줄 → 한 번만 남김 (빈 줄 제외)
  const lines = text.split('\n');
  const deduped = [];
  for (let i = 0; i < lines.length; i++) {
    if (lines[i] === '') {
      // 빈 줄은 중복 제거 대상이 아님
      deduped.push(lines[i]);
    } else if (lines[i] !== lines[i - 1]) {
      deduped.push(lines[i]);
    }
  }
  text = deduped.join('\n');

  // 7. 선·후행 빈 줄 제거: 결과 맨 앞·뒤 빈 줄 제거
  text = text.replace(/^\n+/, '').replace(/\n+$/, '');

  return text;
}

function run() {
  const inputEl = document.getElementById('in');
  const outputEl = document.getElementById('out');
  const copyBtn = document.getElementById('btn-copy');

  const raw = inputEl.value;
  if (!raw.trim()) {
    showToast('⚠️ 입력 텍스트가 없습니다', '#f59e0b');
    return;
  }

  const result = purify(raw);
  outputEl.value = result;
  copyBtn.disabled = false;

  // Update stats
  const inChars = raw.length;
  const outChars = result.length;
  const inLines = raw.split(/\r?\n|\r/).length;
  const outLines = result === '' ? 0 : result.split('\n').length;
  const reduction = inChars > 0
    ? (((inChars - outChars) / inChars) * 100).toFixed(1)
    : 0;

  document.getElementById('stat-in').textContent = inChars.toLocaleString();
  document.getElementById('stat-out').textContent = outChars.toLocaleString();
  document.getElementById('stat-lines-in').textContent = inLines.toLocaleString();
  document.getElementById('stat-lines-out').textContent = outLines.toLocaleString();
  document.getElementById('stat-reduction').textContent = reduction + '%';
}

function copyResult() {
  const outputEl = document.getElementById('out');
  if (!outputEl.value) return;

  navigator.clipboard.writeText(outputEl.value)
    .then(() => showToast('✓ 클립보드에 복사되었습니다'))
    .catch(() => {
      // fallback
      outputEl.select();
      document.execCommand('copy');
      showToast('✓ 복사되었습니다');
    });
}

function clearAll() {
  document.getElementById('in').value = '';
  document.getElementById('out').value = '';
  document.getElementById('btn-copy').disabled = true;
  ['stat-in','stat-out','stat-lines-in','stat-lines-out','stat-reduction']
    .forEach(id => document.getElementById(id).textContent = '—');
}

function showToast(msg, color) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = color
    ? color + 'e6'
    : 'rgba(16, 185, 129, 0.9)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Ctrl+Enter shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
});
</script>
</body>
</html>
