<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="직원 명단 CSV 파일을 업로드하면 부서별 인원수와 평균 근속연수를 집계하여 결과 CSV로 다운로드할 수 있는 웹 도구">
<title>CSV 부서별 집계 도구</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #232638;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --success: #34d399;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --radius: 14px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  /* Background glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header .badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(167,139,250,0.2));
    border: 1px solid rgba(108,99,255,0.4);
    color: var(--accent2);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 18px;
  }

  .header h1 {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .header p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    transition: border-color 0.3s;
  }

  .card:hover { border-color: rgba(108,99,255,0.3); }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    background: rgba(108,99,255,0.02);
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.07);
    transform: translateY(-2px);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(0.3);
  }

  .upload-zone h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .upload-zone p {
    font-size: 13px;
    color: var(--text-muted);
  }

  .file-selected {
    display: none;
    align-items: center;
    gap: 12px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 16px;
    font-size: 14px;
  }

  .file-selected .file-icon { font-size: 20px; }
  .file-selected .file-name { font-weight: 600; color: var(--success); flex: 1; }
  .file-selected .file-clear {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; padding: 0 4px;
    transition: color 0.2s;
  }
  .file-selected .file-clear:hover { color: #f87171; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 16px rgba(108,99,255,0.35);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(108,99,255,0.5);
  }

  .btn-primary:active:not(:disabled) { transform: translateY(0); }

  .btn-success {
    background: linear-gradient(135deg, #059669, var(--success));
    color: #fff;
    box-shadow: 0 4px 16px rgba(52,211,153,0.3);
  }

  .btn-success:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(52,211,153,0.45);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* Result Table */
  #result-section { display: none; }

  .result-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .meta-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
  }

  .meta-chip .label { color: var(--text-muted); }
  .meta-chip .value {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
    display: block;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead tr {
    background: linear-gradient(135deg, rgba(108,99,255,0.18), rgba(167,139,250,0.1));
    border-bottom: 2px solid var(--border);
  }

  th {
    padding: 14px 20px;
    text-align: left;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  td {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(46,50,80,0.6);
    color: var(--text);
    transition: background 0.15s;
  }

  tbody tr:last-child td { border-bottom: none; }

  tbody tr:hover td { background: rgba(108,99,255,0.06); }

  td:nth-child(2), td:nth-child(3) { font-weight: 600; text-align: right; }
  th:nth-child(2), th:nth-child(3) { text-align: right; }

  td:nth-child(3) { color: var(--success); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 14px;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Error */
  .error-box {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    color: #fca5a5;
    font-size: 13px;
    margin-top: 16px;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .card { padding: 20px; }
    .upload-zone { padding: 32px 16px; }
    .btn { font-size: 13px; padding: 10px 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="badge">📊 HR Analytics Tool</div>
    <h1>CSV 부서별 집계 도구</h1>
    <p>직원 명단 CSV를 업로드하면 부서별 인원수와<br>평균 근속연수를 자동으로 집계합니다.</p>
  </div>

  <!-- Upload Card -->
  <div class="card">
    <div class="card-title">파일 업로드</div>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file" accept=".csv">
      <span class="upload-icon">📂</span>
      <h3>CSV 파일을 선택하거나 드래그하세요</h3>
      <p>형식: 성명, 부서, 직급, 근속연수 컬럼 포함 CSV</p>
    </div>

    <div class="file-selected" id="file-info">
      <span class="file-icon">📄</span>
      <span class="file-name" id="file-name-label"></span>
      <button class="file-clear" id="clear-btn" title="파일 제거">✕</button>
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="run-btn" onclick="run()">
        ▶ 집계하기
      </button>
      <button class="btn btn-success" id="dl" disabled onclick="download()">
        ⬇ CSV 다운로드
      </button>
    </div>
  </div>

  <!-- Result Card -->
  <div class="card" id="result-section">
    <div class="card-title">집계 결과</div>

    <div class="result-meta">
      <div class="meta-chip">
        <span class="label">총 부서 수</span>
        <span class="value" id="dept-count">—</span>
      </div>
      <div class="meta-chip">
        <span class="label">총 인원</span>
        <span class="value" id="total-people">—</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>부서</th>
            <th>인원수</th>
            <th>평균근속(소수1자리)</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let resultCsv = "";
let currentFile = null;

/* ── 파일 선택 처리 ── */
const fileInput = document.getElementById('file');
const dropZone  = document.getElementById('drop-zone');
const fileInfo  = document.getElementById('file-info');
const fileLabel = document.getElementById('file-name-label');
const clearBtn  = document.getElementById('clear-btn');
const errorBox  = document.getElementById('error-box');

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) selectFile(fileInput.files[0]);
});

clearBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  resetFile();
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.csv')) {
    selectFile(f);
  } else {
    showError('CSV 파일만 업로드할 수 있습니다.');
  }
});

function selectFile(f) {
  currentFile = f;
  fileLabel.textContent = f.name;
  fileInfo.style.display = 'flex';
  hideError();
  resetResult();
}

function resetFile() {
  currentFile = null;
  fileInput.value = '';
  fileInfo.style.display = 'none';
  resetResult();
  hideError();
}

function resetResult() {
  resultCsv = '';
  document.getElementById('dl').disabled = true;
  document.getElementById('result-section').style.display = 'none';
}

/* ── 에러 표시 ── */
function showError(msg) {
  errorBox.textContent = '⚠ ' + msg;
  errorBox.style.display = 'block';
}
function hideError() { errorBox.style.display = 'none'; }

/* ── 집계 실행 ── */
function run() {
  hideError();
  if (!currentFile) {
    showError('CSV 파일을 먼저 선택해 주세요.');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      // BOM 제거
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

      const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
      if (lines.length < 2) throw new Error('데이터가 부족합니다. 헤더 + 1행 이상 필요합니다.');

      // 헤더 파싱 & 컬럼 인덱스 탐색
      const header = parseCsvLine(lines[0]);
      const deptIdx  = header.findIndex(h => h.trim() === '부서');
      const tenIdx   = header.findIndex(h => h.trim() === '근속연수');

      if (deptIdx === -1) throw new Error('"부서" 컬럼을 찾을 수 없습니다.');
      if (tenIdx === -1)  throw new Error('"근속연수" 컬럼을 찾을 수 없습니다.');

      // 집계
      const map = {}; // 부서 -> { count, sum }
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        if (cols.length < Math.max(deptIdx, tenIdx) + 1) continue;
        const dept = cols[deptIdx].trim();
        const ten  = parseFloat(cols[tenIdx].trim());
        if (!dept) continue;
        if (!map[dept]) map[dept] = { count: 0, sum: 0 };
        map[dept].count++;
        map[dept].sum += isNaN(ten) ? 0 : ten;
      }

      // 가나다순 정렬
      const sorted = Object.keys(map).sort((a, b) => a.localeCompare(b, 'ko'));

      if (sorted.length === 0) throw new Error('집계할 데이터가 없습니다.');

      // CSV 생성 (UTF-8 BOM 포함)
      const csvRows = ['부서,인원수,평균근속(소수1자리)'];
      const tableRows = [];
      let totalPeople = 0;

      sorted.forEach(dept => {
        const { count, sum } = map[dept];
        const avg = Math.round((sum / count) * 10) / 10;
        csvRows.push(`${dept},${count},${avg.toFixed(1)}`);
        tableRows.push({ dept, count, avg });
        totalPeople += count;
      });

      resultCsv = '\uFEFF' + csvRows.join('\r\n');

      // 화면 표시
      const tbody = document.getElementById('result-body');
      tbody.innerHTML = '';
      tableRows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.dept}</td><td>${r.count}</td><td>${r.avg.toFixed(1)}</td>`;
        tbody.appendChild(tr);
      });

      document.getElementById('dept-count').textContent = sorted.length;
      document.getElementById('total-people').textContent = totalPeople;
      document.getElementById('result-section').style.display = 'block';
      document.getElementById('dl').disabled = false;

      showToast('✅ 집계 완료! ' + sorted.length + '개 부서');

      // 결과 카드로 스크롤
      document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showError(err.message);
    }
  };

  reader.onerror = () => showError('파일을 읽는 중 오류가 발생했습니다.');
  reader.readAsText(currentFile, 'UTF-8');
}

/* ── CSV 한 줄 파싱 (따옴표 지원) ── */
function parseCsvLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

/* ── 다운로드 ── */
function download() {
  if (!resultCsv) return;
  const blob = new Blob([resultCsv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'result_dept_summary.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📥 CSV 다운로드 완료');
}

/* ── 토스트 ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
